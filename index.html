<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Agnej — Build Up. Don't Tear Down.</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#101318;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;touch-action:none}#ui{position:fixed;inset:0;color:white;pointer-events:none}#top{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;gap:10px}.panel{background:rgba(0,0,0,.48);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.13);border-radius:16px;padding:10px 12px;box-shadow:0 10px 30px rgba(0,0,0,.25)}h1{font-size:18px;margin:0 0 3px}.small{font-size:12px;opacity:.82;line-height:1.25}#score{font-weight:900;font-size:25px;text-align:center}#hint{position:absolute;bottom:143px;left:14px;right:58px;text-align:center;font-size:12px;opacity:.78}#controls{position:absolute;left:10px;right:10px;bottom:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;pointer-events:auto}button{appearance:none;border:0;border-radius:16px;padding:14px 8px;color:white;background:#2d6cdf;font-weight:900;font-size:15px;box-shadow:0 8px 20px rgba(0,0,0,.28);touch-action:manipulation}button.secondary{background:#323946}button.danger{background:#db4b4b}button.active{background:#2d6cdf}button:active{transform:translateY(1px);filter:brightness(.92)}#msg{position:absolute;left:18px;right:18px;top:50%;transform:translateY(-50%);text-align:center;display:none}.box{display:inline-block;max-width:420px;background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.18);border-radius:22px;padding:18px}#msg h2{margin:0 0 8px;font-size:28px}#msg p{margin:0;opacity:.9}#msgActions{display:flex;gap:10px;margin-top:14px;justify-content:center;pointer-events:auto}#msgActions button{min-width:120px}#eWrap{position:absolute;right:12px;top:24%;bottom:25%;display:flex;align-items:center;gap:8px;pointer-events:auto}#elevation{writing-mode:bt-lr;-webkit-appearance:slider-vertical;appearance:slider-vertical;width:36px;height:100%;accent-color:#2d6cdf;touch-action:none}#eLabel{writing-mode:vertical-rl;transform:rotate(180deg);font-size:11px;opacity:.8;background:rgba(0,0,0,.38);border-radius:10px;padding:8px 4px}@media(min-width:760px){#controls{width:560px;left:50%;transform:translateX(-50%)}}
</style>
</head>
<body>
<div id="ui">
 <div id="top"><div class="panel"><h1>Agnej</h1><div class="small">The Ultimate Reverse Block Stacking Game. Drop blocks from any height — gravity decides.</div></div><div class="panel"><div id="score">0</div><div class="small">blocks</div></div></div>
 <div id="msg"><div class="box"><h2>AGNEJ</h2><p id="msgText">Bricks touching ground: 0<br>Collapse score: 0</p><div id="msgActions"><button id="continueBtn">Continue</button><button class="danger" id="overlayResetBtn">Reset</button></div></div></div>
 <div id="eWrap"><input id="elevation" type="range" min="0" max="7" step="0.02" value="0.48"><div id="eLabel">height from floor</div></div>
 <div id="hint">Loading Rapier physics…</div>
 <div id="controls"><button class="secondary" id="sceneBtn">Scene</button><button class="secondary" id="moveBtn">Move brick</button><button class="secondary" id="levelBtn">Level brick</button><button class="secondary" id="raiseBtn">+ height</button><button id="placeBtn">Place</button><button class="danger" id="resetBtn">Reset</button></div>
</div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.165.0/build/three.module.js';
import RAPIER from 'https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.14.0/+esm';
await RAPIER.init();

const scene=new THREE.Scene();scene.background=new THREE.Color(0x101318);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,.1,100);
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.setSize(innerWidth,innerHeight);renderer.shadowMap.enabled=true;document.body.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0xffffff,0x445566,1.35));const sun=new THREE.DirectionalLight(0xffffff,1.55);sun.position.set(5,10,7);sun.castShadow=true;sun.shadow.mapSize.set(1024,1024);scene.add(sun);
const floor=new THREE.Mesh(new THREE.PlaneGeometry(18,18),new THREE.MeshStandardMaterial({color:0x1d232d,roughness:.9}));floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);scene.add(new THREE.GridHelper(18,18,0x354153,0x252d39));

const size=new THREE.Vector3(1.9,.45,.68), half={x:size.x/2,y:size.y/2,z:size.z/2}, BASE_TOP=size.y, DEFAULT_BOTTOM=BASE_TOP+.03;
const geo=new THREE.BoxGeometry(size.x,size.y,size.z), placedMat=new THREE.MeshStandardMaterial({color:0xd7a05a,roughness:.58,metalness:.02}), baseMat=new THREE.MeshStandardMaterial({color:0xb8864d,roughness:.65}), ghostMat=new THREE.MeshStandardMaterial({color:0x73d0ff,roughness:.45,transparent:true,opacity:.72}), invalidMat=new THREE.MeshStandardMaterial({color:0xff5d5d,roughness:.45,transparent:true,opacity:.72});
const scoreEl=document.getElementById('score'),msg=document.getElementById('msg'),msgText=document.getElementById('msgText'),hint=document.getElementById('hint'),elevationEl=document.getElementById('elevation'),continueBtn=document.getElementById('continueBtn'),overlayResetBtn=document.getElementById('overlayResetBtn');
let world,groundCollider,items=[],ghost,gizmo,score=0,agnej=false,cleanup=false,cleanupQuiet=0,collapseScore=0,targetX=0,targetZ=0,brickQ=new THREE.Quaternion(),mode='scene',camRadius=10.7,camAngle=.92,camY=0;
const GROUND_TOUCH_EPS=.075; // Treat resting on, or slightly inside, the floor as grounded.
const raycaster=new THREE.Raycaster(), pointer=new THREE.Vector2(), axisColor={x:0xff5656,y:0x59f06d,z:0x5aa4ff};let activeAxis=null;

function makeMesh(mat){const m=new THREE.Mesh(geo,mat);m.castShadow=m.receiveShadow=true;scene.add(m);return m}
function makeBody(type,x,y,z,q,base=false){const desc=(type==='fixed'?RAPIER.RigidBodyDesc.fixed():RAPIER.RigidBodyDesc.dynamic()).setTranslation(x,y,z).setRotation({x:q.x,y:q.y,z:q.z,w:q.w});if(type!=='fixed')desc.setLinearDamping(.12).setAngularDamping(.28).setCanSleep(true);const body=world.createRigidBody(desc);const col=world.createCollider(RAPIER.ColliderDesc.cuboid(half.x,half.y,half.z).setFriction(.42).setRestitution(0),body);const mesh=makeMesh(base?baseMat:placedMat);mesh.position.set(x,y,z);mesh.quaternion.copy(q);const item={mesh,body,col,base,age:0};items.push(item);return item}
function makeGizmo(){if(gizmo)scene.remove(gizmo);gizmo=new THREE.Group();scene.add(gizmo);for(const axis of ['x','y','z']){const visible=new THREE.Mesh(new THREE.TorusGeometry(1.38,.035,16,128),new THREE.MeshBasicMaterial({color:axisColor[axis],transparent:true,opacity:.95,depthTest:false}));const hit=new THREE.Mesh(new THREE.TorusGeometry(1.38,.24,12,96),new THREE.MeshBasicMaterial({transparent:true,opacity:.01,depthWrite:false,depthTest:false}));for(const r of [visible,hit]){if(axis==='x')r.rotation.y=Math.PI/2;if(axis==='y')r.rotation.x=Math.PI/2;r.userData.axis=axis;r.renderOrder=20}visible.userData.visibleRing=true;hit.userData.hit=true;gizmo.add(visible,hit)}}
function setGizmoOpacity(axis=null){if(!gizmo)return;for(const r of gizmo.children){if(!r.userData.visibleRing)continue;r.material.opacity=axis?(r.userData.axis===axis?1:.10):.95}}
function reset(){for(const it of items){scene.remove(it.mesh);try{world?.removeRigidBody(it.body)}catch(e){}}items=[];if(ghost)scene.remove(ghost);if(gizmo)scene.remove(gizmo);score=0;collapseScore=0;scoreEl.textContent='0';agnej=false;cleanup=false;cleanupQuiet=0;msg.style.display='none';targetX=0;targetZ=0;brickQ.identity();elevationEl.value=String(DEFAULT_BOTTOM);world=new RAPIER.World({x:0,y:-9.81,z:0});world.timestep=1/60;const groundBody=world.createRigidBody(RAPIER.RigidBodyDesc.fixed().setTranslation(0,-.055,0));groundCollider=world.createCollider(RAPIER.ColliderDesc.cuboid(20,.05,20).setFriction(.55).setRestitution(0),groundBody);[-size.z,0,size.z].forEach(z=>makeBody('fixed',0,half.y,z,new THREE.Quaternion(),true));ghost=makeMesh(ghostMat);makeGizmo();updateGhost();setMode(mode);flash('Drag colored rings to rotate. Move mode swipes are camera-relative. Slider is floor-relative. You may drop from height.')}
function setGhostY(){const bottom=Number(elevationEl.value);ghost.position.set(targetX,bottom+half.y,targetZ);ghost.quaternion.copy(brickQ);gizmo.position.copy(ghost.position);gizmo.quaternion.copy(ghost.quaternion)}
function intersectsGhost(){const shape=new RAPIER.Cuboid(half.x*.985,half.y*.985,half.z*.985);let hit=false;world.intersectionsWithShape({x:ghost.position.x,y:ghost.position.y,z:ghost.position.z},{x:ghost.quaternion.x,y:ghost.quaternion.y,z:ghost.quaternion.z,w:ghost.quaternion.w},shape,(c)=>{if(c.handle!==groundCollider.handle){hit=true;return false}return true});return hit}
function bottomSamplePoints(pos,q){const pts=[];for(const sx of [-1,0,1])for(const sz of [-1,0,1])pts.push(new THREE.Vector3(sx*half.x,-half.y,sz*half.z).applyQuaternion(q).add(pos));return pts}
function hasSupportBelow(){const pos=ghost.position,q=ghost.quaternion;for(const p of bottomSamplePoints(pos,q)){const ray=new RAPIER.Ray({x:p.x,y:p.y+.025,z:p.z},{x:0,y:-1,z:0});let ok=false;world.intersectionsWithRay(ray,.12,true,(col)=>{if(col.handle!==groundCollider.handle){ok=true;return false}return true});if(ok)return true}return false}
function updateGhost(){if(!ghost)return;setGhostY();ghost.material=intersectsGhost()?invalidMat:ghostMat}
function place(){if(agnej)return flash('Press Continue to remove fallen bricks, or Reset to restart.');updateGhost();if(intersectsGhost())return flash('Cannot place: projected brick intersects another brick. Lift or move it before placing.');const p=ghost.position,q=ghost.quaternion.clone();const it=makeBody('dynamic',p.x,p.y,p.z,q,false);it.body.setLinvel({x:0,y:0,z:0},true);it.body.setAngvel({x:0,y:0,z:0},true);scoreEl.textContent=String(++score);targetX=THREE.MathUtils.clamp(targetX+(Math.random()-.5)*.25,-3.3,3.3);targetZ=THREE.MathUtils.clamp(targetZ+(Math.random()-.5)*.25,-2.9,2.9);elevationEl.value=String(Math.min(Number(elevationEl.max),p.y+half.y+.08));updateGhost()}
function lowestCornerY(mesh){let min=Infinity;for(const sx of [-1,1])for(const sy of [-1,1])for(const sz of [-1,1]){const p=new THREE.Vector3(sx*half.x,sy*half.y,sz*half.z).applyQuaternion(mesh.quaternion).add(mesh.position);min=Math.min(min,p.y)}return min}
function groundedItems(){return items.filter(it=>!it.base&&it.age>.15&&lowestCornerY(it.mesh)<=GROUND_TOUCH_EPS)}
function updateAgnejOverlay(){const n=groundedItems().length;msgText.innerHTML='Bricks touching ground: '+n+'<br>Collapse score: '+collapseScore+'<br><span style="font-size:12px;opacity:.78">Physics is still running</span>';}
function enterAgnej(){if(!agnej){agnej=true;msg.style.display='block';flash('AGNEJ! Physics keeps running. Continue removes all bricks touching the floor.')}updateAgnejOverlay()}
function removeItem(it){scene.remove(it.mesh);try{world.removeRigidBody(it.body)}catch(e){}const idx=items.indexOf(it);if(idx>=0)items.splice(idx,1)}
function removeGroundedBricks(){const fallen=groundedItems();if(!fallen.length)return 0;for(const it of fallen)removeItem(it);collapseScore+=fallen.length;score=Math.max(0,score-fallen.length);scoreEl.textContent=String(score);updateAgnejOverlay();return fallen.length}
function continueGame(){if(!agnej)return;const removed=removeGroundedBricks();cleanup=true;cleanupQuiet=.9;msg.style.display='none';flash(removed?'Removed '+removed+' fallen bricks · collapse score: '+collapseScore:'Continuing · watching for more falling bricks')}
function sync(){for(const it of items){const t=it.body.translation(),r=it.body.rotation();it.mesh.position.set(t.x,t.y,t.z);it.mesh.quaternion.set(r.x,r.y,r.z,r.w);it.age+=world.timestep}if(groundedItems().length)enterAgnej();else if(agnej&&!cleanup)updateAgnejOverlay()}
function flash(t){hint.textContent=t;hint.style.opacity='1';clearTimeout(flash.t);flash.t=setTimeout(()=>{hint.textContent='Scene/Move choose swipes · drag colored rings to rotate · right slider sets drop height from floor';hint.style.opacity='.78'},2600)}
function camAxes(){const right=new THREE.Vector3().setFromMatrixColumn(camera.matrixWorld,0);right.y=0;if(right.lengthSq()<.0001)right.set(-Math.sin(camAngle),0,Math.cos(camAngle));right.normalize();const fwd=new THREE.Vector3();camera.getWorldDirection(fwd);fwd.y=0;if(fwd.lengthSq()<.0001)fwd.set(-Math.cos(camAngle),0,-Math.sin(camAngle));fwd.normalize();return{right,fwd}}
function pickAxis(e){if(!gizmo)return null;const p=pt(e);pointer.x=p.clientX/innerWidth*2-1;pointer.y=-(p.clientY/innerHeight)*2+1;raycaster.setFromCamera(pointer,camera);const hits=raycaster.intersectObjects(gizmo.children.filter(o=>o.userData.hit),false);return hits[0]?.object.userData.axis||null}
let dragging=false,lastX=0,lastY=0,two=false,pinch=0;function pt(e){return e.touches?e.touches[0]:e}function down(e){const p=pt(e);lastX=p.clientX;lastY=p.clientY;activeAxis=pickAxis(e);if(activeAxis){setGizmoOpacity(activeAxis);flash('Rotating '+activeAxis.toUpperCase()+' axis');e.preventDefault?.()}dragging=true}function move(e){if(!dragging)return;if(e.touches&&e.touches.length===2){two=true;const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.hypot(dx,dy);if(pinch)camRadius=THREE.MathUtils.clamp(camRadius+(pinch-d)*.018,6,16);pinch=d;return}const p=pt(e);if(two){lastX=p.clientX;lastY=p.clientY;two=false;return}const dx=p.clientX-lastX,dy=p.clientY-lastY;if(Math.abs(dx)+Math.abs(dy)>1){if(activeAxis){const amount=(Math.abs(dx)>Math.abs(dy)?dx:-dy)*.011;const axis=new THREE.Vector3(activeAxis==='x'?1:0,activeAxis==='y'?1:0,activeAxis==='z'?1:0);brickQ.multiply(new THREE.Quaternion().setFromAxisAngle(axis,amount)).normalize();updateGhost();e.preventDefault?.()}else if(mode==='scene'){camAngle-=dx*.007;camY=THREE.MathUtils.clamp(camY+dy*.018,-2.2,3.2)}else{const {right,fwd}=camAxes(),scale=.012*(camRadius/10);targetX=THREE.MathUtils.clamp(targetX+(right.x*dx-fwd.x*dy)*scale,-3.4,3.4);targetZ=THREE.MathUtils.clamp(targetZ+(right.z*dx-fwd.z*dy)*scale,-2.9,2.9);updateGhost()}}lastX=p.clientX;lastY=p.clientY}function up(){dragging=false;two=false;pinch=0;activeAxis=null;setGizmoOpacity(null)}
renderer.domElement.addEventListener('touchstart',down,{passive:false});renderer.domElement.addEventListener('touchmove',move,{passive:false});renderer.domElement.addEventListener('touchend',up,{passive:false});renderer.domElement.addEventListener('pointerdown',down);renderer.domElement.addEventListener('pointermove',move);renderer.domElement.addEventListener('pointerup',up);renderer.domElement.addEventListener('pointercancel',up);
function setMode(m){mode=m;sceneBtn.classList.toggle('active',m==='scene');moveBtn.classList.toggle('active',m==='move')}sceneBtn.onclick=()=>setMode('scene');moveBtn.onclick=()=>setMode('move');levelBtn.onclick=()=>{const yaw=new THREE.Euler().setFromQuaternion(brickQ,'YXZ').y;brickQ.setFromAxisAngle(new THREE.Vector3(0,1,0),Math.round(yaw/(Math.PI/2))*Math.PI/2);updateGhost()};raiseBtn.onclick=()=>{elevationEl.value=String(Math.min(Number(elevationEl.max),Number(elevationEl.value)+size.y+.03));updateGhost()};placeBtn.onclick=place;resetBtn.onclick=reset;continueBtn.onclick=continueGame;overlayResetBtn.onclick=reset;elevationEl.oninput=updateGhost;addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
let acc=0,last=performance.now();function animate(now){requestAnimationFrame(animate);const dt=Math.min((now-last)/1000,.05);last=now;acc+=dt;while(acc>=1/60){world.step();acc-=1/60}sync();if(cleanup){const removed=removeGroundedBricks();if(removed){cleanupQuiet=.9}else{cleanupQuiet-=dt;if(cleanupQuiet<=0){cleanup=false;agnej=false;msg.style.display='none';flash('Continue · collapse score: '+collapseScore)}}}camera.position.x=Math.cos(camAngle)*camRadius;camera.position.z=Math.sin(camAngle)*camRadius;const top=Math.max(1.5,...items.map(it=>it.mesh.position.y));camera.position.y=THREE.MathUtils.lerp(camera.position.y,Math.min(10,4.7+top*.22+camY),.04);camera.lookAt(0,Math.min(5,1.2+top*.25),0);renderer.render(scene,camera)}reset();requestAnimationFrame(animate);
</script>
</body>
</html>
